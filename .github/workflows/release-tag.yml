name: Release Tag

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-26
    timeout-minutes: 90
    env:
      ZIG_LOCAL_CACHE_DIR: /Users/runner/zig/local-cache
      ZIG_GLOBAL_CACHE_DIR: /Users/runner/zig/global-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: info
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          BUILD=$(git rev-list --count HEAD)
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: XCode Select
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build GhosttyKit
        run: |
          zig build \
            -Doptimize=ReleaseFast \
            -Demit-macos-app=false

      - name: Build GingerTTY.app
        run: |
          cd macos
          env -i HOME="$HOME" PATH="/usr/bin:/bin:/usr/sbin:/sbin" \
            xcodebuild -target Ghostty -configuration Release

      - name: Update Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.info.outputs.build }}" "macos/build/Release/GingerTTY.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.info.outputs.version }}" "macos/build/Release/GingerTTY.app/Contents/Info.plist"

      - name: Zip App
        run: |
          cd macos/build/Release
          zip -9 -r --symlinks ../../../GingerTTY-macos-universal.zip GingerTTY.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: GingerTTY-macos
          path: GingerTTY-macos-universal.zip

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      ZIG_LOCAL_CACHE_DIR: /Users/runner/zig/local-cache
      ZIG_GLOBAL_CACHE_DIR: /Users/runner/zig/global-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: XCode Select
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build GhosttyKit
        run: zig build -Doptimize=ReleaseFast -Demit-macos-app=false

      - name: Run Tests
        run: |
          cd macos
          env -i HOME="$HOME" PATH="/usr/bin:/bin:/usr/sbin:/sbin" \
            xcodebuild -project Ghostty.xcodeproj -scheme Ghostty \
            -configuration Debug \
            -skip-testing GhosttyUITests \
            -resultBundlePath ../TestResults.xcresult \
            test

      - name: Print test failures
        if: failure()
        run: |
          xcrun xcresulttool get test-results summary --path TestResults.xcresult 2>/dev/null || true
          echo "---"
          xcrun xcresulttool get test-results tests --path TestResults.xcresult 2>/dev/null | grep -A5 -i "fail" || true
